name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Secret scanning — fails the build if a credential is committed (NFR-035).
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dependency vulnerability scan — fails on high/critical advisories (NFR-034).
  dependency-audit:
    name: npm audit (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [woxa-vault-api, woxa-vault-web]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit production dependencies (high+)
        run: npm audit --audit-level=high --omit=dev
